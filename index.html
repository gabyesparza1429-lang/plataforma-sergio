<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sergio's Learning World</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Estilo Crítico para evitar desorden */
        .view { display: none; width: 100%; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .view.active { display: block; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="admin-trigger" onclick="showLogin()">⚙️</div>

    <section id="view-login" class="view">
        <div class="admin-card" style="max-width: 300px; margin: 100px auto; text-align: center;">
            <h3>Accès Gaby</h3>
            <input type="password" id="admin-pass-input" placeholder="Mot de passe" style="width:100%; margin-bottom:10px; padding:10px;">
            <button class="btn-save" onclick="checkAdminPassword()">Entrer</button>
            <button class="btn-nav" onclick="goToHome()" style="margin-top:10px;">Annuler</button>
        </div>
    </section>

    <main id="view-home" class="view active">
        <h1 class="main-title">Salut, Sergio ! 👋</h1>
        
        <div id="reminders-section" class="reminders-container">
            <h3>📌 Rappels (Pendientes)</h3>
            <div id="reminders-list"></div>
        </div>

        <div class="grid-subjects" id="subjects-grid"></div>
    </main>

    <section id="view-subject" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToHome()">⬅ Retour</button>
            <h2 id="current-subject-title">MATIÈRE</h2>
        </div>

        <div class="chart-container">
            <h3>📊 Ton niveau actuel</h3>
            <canvas id="progressionChart"></canvas>
            <div id="achievement-info" class="achievement-box"></div>
        </div>

        <div id="folders-container" class="folder-grid"></div>
        
        <button id="btn-exam" class="btn-finish hidden" style="background:#9b59b6;" onclick="startExam()">COMMENCER L'EXAMEN 🎓</button>
    </section>

    <section id="view-activity" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToSubject()">⬅ Retour</button>
        </div>
        <div id="activity-place" class="iframe-wrapper"></div>
        <button class="btn-finish" onclick="openFinishModal()">J'AI FINI ! 🌟</button>
    </section>

    <section id="view-admin" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToHome()">Quitter</button>
            <h2>Panel de Gaby 👩‍🏫</h2>
        </div>
        
        <div class="admin-card">
            <h3>➕ Ajouter Activité / Lien</h3>
            <select id="adm-materia">
                <option value="histoire">Histoire</option>
                <option value="francais">Français</option>
                <option value="espagnol">Espagnol</option>
                <option value="anglais">Anglais</option>
                <option value="allemand">Allemand</option>
                <option value="physique">Physique</option>
            </select>
            <input type="text" id="adm-tema" placeholder="Nom du thème">
            <textarea id="adm-code" placeholder="Code <iframe> o URL (http://...)"></textarea>
            <button class="btn-save" onclick="saveData()">Sauvegarder</button>
        </div>

        <div class="admin-card" style="margin-top:20px;">
            <h3>📚 Banco de Preguntas (PDF)</h3>
            <input type="file" id="pdf-upload" accept="application/pdf">
            <button class="btn-save" style="background:#9b59b6;" onclick="processPDF()">Extraer Preguntas</button>
            <p id="pdf-status"></p>
        </div>

        <div class="admin-card" style="margin-top:20px;">
            <h3>📌 Rappel</h3>
            <input type="text" id="rem-text" placeholder="Message pour Sergio">
            <input type="date" id="rem-date">
            <button class="btn-save" style="background:#e67e22;" onclick="saveReminder()">Ajouter</button>
        </div>
    </section>

    <div id="modal-score" class="modal hidden">
        <div class="modal-content">
            <h3>Félicitations !</h3>
            <p>Note Wordwall (1-20) :</p>
            <input type="number" id="input-note" min="1" max="20" value="20">
            <button class="btn-save" onclick="saveFinalScore()">Valider</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
