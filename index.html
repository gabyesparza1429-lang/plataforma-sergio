<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Plataforma de Aprendizaje - Sergio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Panel de Estudio - Sistema Francés</h1>
        <div id="stats-header">
            Materia: <span id="current-subject">Mathématiques</span> | 
            Tiempo: <span id="timer">00:00</span>
        </div>
    </header>

    <main id="app-container">
        <section id="exercise-area">
            <h2 id="question">Cargando ejercicio...</h2>
            <div id="options"></div>
            <button onclick="checkAnswer()">Enviar Respuesta</button>
        </section>

        <hr>

        <section id="report-area">
            <h3>Reporte de Progreso</h3>
            <table border="1" id="report-table">
                <thead>
                    <tr>
                        <th>Materia</th>
                        <th>Actividades</th>
                        <th>Tiempo Total</th>
                        <th>Nota Media</th>
                    </tr>
                </thead>
                <tbody id="report-body">
                    </tbody>
            </table>
            <button id="exam-btn" style="display:none;" onclick="generateExam()">Generar Examen Final</button>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
