<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plateforme d'Études - Sergio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Bonjour, Sergio! 👋</h1>
            <div id="stats-bar">
                <span>Matière: <strong id="subject-name">Maths</strong></span>
                <span>Temps: <strong id="timer">00:00</strong></span>
            </div>
        </header>

        <section id="game-container">
            <div id="question-card">
                <h2 id="question-text">Chargement...</h2>
                <div id="options-grid"></div>
            </div>
        </section>

        <section id="report-section">
            <h3>Rapport de Progrès</h3>
            <div id="report-display">
                </div>
            <button id="exam-btn" class="hidden" onclick="startExam()">Commencer l'Examen Final 🎓</button>
        </section>
    </div>
    <script src="script.js"></script>
</body>
</html>
