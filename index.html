<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sergio's Learning World</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

    <div id="admin-access" onclick="openAdmin()">⚙️</div>

    <main id="view-home" class="view">
        <h1 class="main-title">Salut, Sergio ! 👋</h1>
        <div class="grid-subjects" id="subjects-grid">
            </div>
    </main>

    <section id="view-subject" class="view hidden">
        <div class="header-nav">
            <button class="btn-nav" onclick="showView('view-home')">⬅ Retour</button>
            <h2 id="current-subject-title">Matière</h2>
        </div>
        <div id="folders-container" class="folder-grid"></div>
    </section>

    <section id="view-activity" class="view hidden">
        <div class="header-nav">
            <button class="btn-nav" onclick="showView('view-subject')">⬅ Retour aux thèmes</button>
        </div>
        <div id="activity-place" class="iframe-wrapper"></div>
        <button class="btn-finish" onclick="openFinishModal()">J'AI FINI ! 🌟</button>
    </section>

    <section id="view-admin" class="view hidden">
        <div class="header-nav">
            <button class="btn-nav" onclick="showView('view-home')">Fermer</button>
            <h2>Configuration Gaby</h2>
        </div>
        <div class="admin-card">
            <h3>Ajouter une activité</h3>
            <select id="adm-materia">
                <option value="histoire">Histoire</option>
                <option value="francais">Français</option>
                <option value="espagnol">Espagnol</option>
                <option value="anglais">Anglais</option>
                <option value="allemand">Allemand</option>
                <option value="physique">Physique</option>
            </select>
            <input type="text" id="adm-tema" placeholder="Nom du thème">
            <textarea id="adm-code" placeholder="Coller le code <iframe> de Wordwall"></textarea>
            <button class="btn-save" onclick="saveData()">Sauvegarder</button>
        </div>
    </section>

    <div id="modal-score" class="modal hidden">
        <div class="modal-content">
            <h3>Bien joué ! 🎉</h3>
            <p>Quelle note as-tu eue ? (0-20)</p>
            <input type="number" id="input-note" min="0" max="20" value="20">
            <button class="btn-save" onclick="saveFinalScore()">Valider</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
