<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sergio's Learning World - Cloud Version</title>
   <link rel="icon" type="image/png" href="favicon.png">
    <link rel="apple-touch-icon" href="favicon.png">
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        .view { display: none; width: 100%; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .view.active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="admin-trigger" onclick="showLogin()">⚙️</div>

    <section id="view-login" class="view">
        <div class="admin-card login-center" style="margin-top: 100px;">
            <h2>🔐 Admin</h2>
            <input type="password" id="admin-pass-input" placeholder="Code secret...">
            <button class="btn-rocket" onclick="checkAdminPassword()">Entrer</button>
        </div>
    </section>

    <section id="view-admin" class="view">
        <div class="admin-card master-admin">
            <button class="btn-back" onclick="showView('view-home')">⬅ Retour</button>
            <h2>🚀 Dashboard Pro</h2>
            <div class="admin-form-grid">
                <p>Matière :</p>
                <select id="adm-materia" onchange="renderAdminThemes()">
                    <option value="histoire">Histoire / Géo</option>
                    <option value="francais">Français</option>
                    <option value="espagnol">Espagnol</option>
                    <option value="anglais">Anglais</option>
                    <option value="allemand">Allemand</option>
                    <option value="physique">Physique-Chimie</option>
                    <option value="musique">Musique</option>
                    <option value="math">Mathématiques</option>
                    <option value="svt">SVT</option>
                </select>
                
                <div id="admin-themes-list" style="margin-top: 10px; margin-bottom: 20px; text-align: left; max-height: 180px; overflow-y: auto; padding: 15px; background: #f1f2f6; border-radius: 20px; border: 2px dashed #ccc;">
                    <!-- Aquí aparecen los temas para borrar -->
                </div>

                <input type="text" id="adm-tema-name" placeholder="Nom du thème (Opcional si solo envías aviso)">
                <p>Contenu de la leçon :</p>
                <textarea id="adm-ppt" placeholder="1. PowerPoint Embed Code"></textarea>
                <textarea id="adm-iframe" placeholder="2. Wordwall Iframe"></textarea>
                <input type="text" id="adm-url" placeholder="3. URL externa">
                <input type="text" id="adm-video" placeholder="4. YouTube Link">
                <hr>
                <p>📌 Rappel & Aviso :</p>
                <input type="text" id="rem-text" placeholder="Message de rappel">
                <input type="date" id="rem-date">
            </div>
            <button class="btn-rocket" onclick="saveEverything()">🚀 SAUVEGARDER TOUT</button>
            <p id="save-status" style="text-align:center; font-weight:bold;"></p>
        </div>
    </section>

    <!-- Resto del cuerpo (Home, Temas, etc.) se mantiene igual -->
    <!-- Se asume que el resto del contenido visual no se toca -->

    <script src="script.js"></script>
</body>
</html>
