<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sergio's Learning World</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Bloqueo de seguridad para que no se encimen las pantallas */
        .view { display: none; width: 100%; min-height: 100vh; padding: 20px; box-sizing: border-box; }
        .view.active { display: block !important; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="admin-trigger" onclick="showLogin()">⚙️</div>

    <section id="view-login" class="view">
        <div class="admin-card login-center">
            <h3>Accès Gaby 👩‍🏫</h3>
            <input type="password" id="admin-pass-input" placeholder="Mot de passe">
            <button class="btn-save" onclick="checkAdminPassword()">Entrer</button>
            <button class="btn-nav" onclick="goToHome()">Annuler</button>
        </div>
    </section>

    <main id="view-home" class="view active">
        <h1 class="main-title">Salut, Sergio ! 👋</h1>
        <div id="reminders-section" class="reminders-container">
            <h3>📌 Rappels (Pendientes)</h3>
            <div id="reminders-list"></div>
        </div>
        <div class="grid-subjects" id="subjects-grid"></div>
    </main>

    <section id="view-subject" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToHome()">⬅ Retour</button>
            <h2 id="current-subject-title">MATIÈRE</h2>
        </div>
        <div class="chart-container">
            <canvas id="progressionChart"></canvas>
            <div id="achievement-info" class="achievement-box"></div>
        </div>
        <div id="folders-container" class="grid-subjects"></div>
    </section>

    <section id="view-theme-path" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToSubject()">⬅ Retour</button>
            <h2 id="path-theme-title">TEMA</h2>
        </div>
        <div id="path-buttons-container" class="grid-subjects" style="margin-top:30px;">
            </div>
    </section>

    <section id="view-activity" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goBackToPath()">⬅ Retour</button>
        </div>
        <div id="activity-place" class="iframe-wrapper"></div>
        
        <div id="quiz-container" class="hidden quiz-box">
            <h3 id="quiz-question"></h3>
            <input type="text" id="quiz-answer" placeholder="Ta réponse...">
            <button class="btn-save" onclick="checkQuizAnswer()">Vérifier</button>
        </div>
        
        <button class="btn-finish" id="finish-btn-step" onclick="completeStep()">J'AI FINI ! 🌟</button>
    </section>

    <section id="view-admin" class="view">
        <div class="header-nav">
            <button class="btn-nav" onclick="goToHome()">Quitter</button>
            <h2>Configuration Gaby</h2>
        </div>
        <div class="admin-card master-admin">
            <h3>📝 Nouvelle Session Complète</h3>
            <div class="admin-form-grid">
                <div class="form-group">
                    <label>Matière:</label>
                   <select id="adm-materia">
    <option value="histoire">Histoire</option>
    <option value="francais">Français</option>
    <option value="espagnol">Espagnol</option>
    <option value="anglais">Anglais</option>
    <option value="allemand">Allemand</option>
    <option value="physique">Physique</option>
    <option value="musique">Musique</option>
    <option value="math">Mathématiques</option>
    <option value="svt">SVT</option>
</select>
                </div>
                <div class="form-group">
                    <label>Nom du thème:</label>
                    <input type="text" id="adm-tema-name" placeholder="Ex: Les Volcans">
                </div>
                <textarea id="adm-ppt" placeholder="1. PowerPoint Embed Code"></textarea>
                <textarea id="adm-iframe" placeholder="2. Wordwall Iframe"></textarea>
                <input type="text" id="adm-url" placeholder="3. Link Web (URL)">
                <input type="text" id="adm-video" placeholder="4. YouTube Link">
                <div class="form-group">
                    <label>Archivo PDF (Ejercicios):</label>
                    <input type="file" id="adm-pdf" accept="application/pdf">
                </div>
                <hr>
                <div class="form-group">
                    <label>📌 Rappel (Aviso):</label>
                    <input type="text" id="rem-text" placeholder="Tarea para Sergio">
                    <input type="date" id="rem-date">
                </div>
            </div>
            <button class="btn-rocket" onclick="saveEverything()">🚀 SAUVEGARDER TOUT</button>
            <p id="save-status"></p>
        </div>
    </section>

    <div id="modal-score" class="modal hidden">
        <div class="modal-content">
            <h3>Excellent Sergio!</h3>
            <p>Ta note (1-20):</p>
            <input type="number" id="input-note" min="1" max="20" value="20">
            <button class="btn-save" onclick="saveStepScore()">Valider</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
